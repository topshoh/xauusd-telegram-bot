name: XAUUSD Alerts (events + price spikes)

# Запускается каждые 15 минут. JBlanked API имеет лимит 1 запрос/5 минут
# на бесплатном тарифе, 15 минут — безопасный запас.
# Плюс можно запустить вручную через вкладку Actions ("Run workflow").
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно, чтобы бот мог сам коммитить файл состояния
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run alerts check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JBLANKED_API_KEY: ${{ secrets.JBLANKED_API_KEY }}
          GITHUB_TOKEN_FOR_STATE: ${{ secrets.GITHUB_TOKEN }}
        run: python xauusd_alerts_bot.py
