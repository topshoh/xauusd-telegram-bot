name: XAUUSD COT Weekly Update

# ОТКЛЮЧЕНО 16.07.2026: COT-данные теперь берутся живыми (реальный CFTC API)
# внутри xauusd_numeric_bot.py — этот отдельный бот стал дублировать функционал.
# Расписание закомментировано ниже — сам бот и код никуда не делись,
# можно запустить вручную через "Run workflow", если понадобится.
on:
  # schedule:
  #   - cron: "0 20 * * 5"
  workflow_dispatch: {}

jobs:
  send-cot-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send COT Telegram update
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python xauusd_cot_telegram_bot.py
