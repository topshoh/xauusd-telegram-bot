name: XAUUSD Numeric Bot

on:
  schedule:
    # Каждый день в 07:00 UTC (12:00 по Ташкенту) — бот сам решает внутри
    # кода, слать ли полную сводку (понедельник / рядом важная дата) или
    # промолчать.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force_test:
        description: 'Игнорировать проверку на закрытый рынок (для теста)'
        required: false
        default: 'false'

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run numeric bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          FORCE_TEST_RUN: ${{ github.event.inputs.force_test }}
        run: python xauusd_numeric_bot.py
