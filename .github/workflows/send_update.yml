name: XAUUSD Telegram Update

# Запускается каждый час, в начале каждого часа (UTC).
# Плюс можно запустить вручную через вкладку Actions на GitHub ("Run workflow").
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send Telegram update
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python xauusd_telegram_bot.py
